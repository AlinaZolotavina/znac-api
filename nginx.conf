server {

        server_name api.znac.org;
        location / {
                client_max_body_size 10M;
                #add_header 'Access-Control-Allow-Origin' 'https://znac.org' always;
                #add_header 'Access-Control-Allow-Credentials' 'true' always;
                #add_header 'Access-Control-Allow-Methods' 'GET, PUT, PATCH, DELETE, POST, OPTIONS, HEAD' always;
                #add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                proxy_pass http://localhost:3000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
        }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/znac.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/znac.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {

        server_name znac.org;

        root /home/ubuntu/znac;

        location / {
                try_files $uri $uri/ /index.html;
        }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/znac.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/znac.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = znac.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;

        server_name znac.org;
    return 404; # managed by Certbot


}

server {
    if ($host = api.znac.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;

        server_name api.znac.org;
    return 404; # managed by Certbot


}